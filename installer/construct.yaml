name: body-eye-sync
version: "{{ environ.get('BODY_EYE_SYNC_VERSION') }}"
installer_type: exe

channels:
  - conda-forge

specs:
  - python 3.11.*
  - pip
  - ultralytics
  - pyside6
  - qtpy
  - menuinst    # to create the Start-menu/desktop shortcuts in post_install.bat

  # The packages and version constraints below are taken from boxmot's
  # dependencies. boxmot is pip-installed with --no-deps in post_install.bat,
  # If the boxmot pinned version is updated, these need to be updated to match boxmot's pyproject.toml
  - click >=8.1.8
  - filterpy >=1.4.5,<2
  - ftfy >=6.1.3,<7
  - gdown >=5.1.0,<6
  - huggingface_hub >=1.7.1
  - lap >=0.5.5,<1          # boxmot uses pip name "lapx"
  - numpy >=2.2.0
  - opencv >=4.7,<5         # boxmot uses pip name "opencv-python"
  - pandas >=2.0.0,<3
  - regex >=2024.0.0
  - rich >=15.0.0
  - scikit-learn >=1.3.0,<2
  - pytorch >=2.2.1,<3      # boxmot uses pip name "torch"
  - torchvision >=0.17.1,<1
  - yacs >=0.1.8,<1

extra_files:
  - body_eye_sync-{{ environ.get('BODY_EYE_SYNC_VERSION') }}-py3-none-any.whl
  - menu.json

post_install: post_install.bat
pre_uninstall: pre_uninstall.bat

icon_image: ../src/body_eye_sync/resources/icon.ico

license_file: ../LICENSE.md
