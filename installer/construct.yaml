# constructor configuration for the Windows installer.
#
# Strategy: the entire native/heavy stack (torch, opencv, ultralytics, ...) is
# installed from conda-forge, where the binaries are built and dependency-
# resolved correctly. Only the two pure-Python pieces that are not on
# conda-forge -- our own package and boxmot -- are added on top with a
# `--no-deps` pip step in post_install.bat (every boxmot dependency is already
# provided by the conda specs below).
#
# Build with:  constructor installer/
name: body-eye-sync
version: 0.0.1
installer_type: exe

channels:
  - conda-forge

# Direct dependencies only; conda resolves their transitive dependencies.
specs:
  - python 3.11.*
  - pip
  - ultralytics
  - pyside6
  - qtpy
  - menuinst    # creates the Start-menu/desktop shortcut in post_install.bat

  # The packages and version constraints below are taken from boxmot's
  # dependencies. boxmot is pip-installed with --no-deps in post_install.bat,
  # so conda never sees these constraints and would otherwise pull incompatible
  # versions (e.g. opencv 5). KEEP THIS LIST IN SYNC WITH boxmot's pyproject.
  - click >=8.1.8
  - filterpy >=1.4.5,<2
  - ftfy >=6.1.3,<7
  - gdown >=5.1.0,<6
  - huggingface_hub >=1.7.1
  - lap >=0.5.5,<1          # boxmot lists lapx (not on conda-forge); lap provides the same `lap` import
  - numpy >=2.2.0
  - opencv >=4.7,<5         # boxmot constraint is on the pip name opencv-python
  - pandas >=2.0.0,<3
  - regex >=2024.0.0
  - rich >=15.0.0
  - scikit-learn >=1.3.0,<2
  - pytorch >=2.2.1,<3      # boxmot lists this under the pip name torch
  - torchvision >=0.17.1,<1
  - yacs >=0.1.8,<1

# Our wheel is built in CI and copied next to this file before running
# constructor; it is laid down in the install prefix and pip-installed by
# post_install.bat.
extra_files:
  - body_eye_sync-0.0.1-py3-none-any.whl
  - menu.json

post_install: post_install.bat
pre_uninstall: pre_uninstall.bat

license_file: ../LICENSE.md
