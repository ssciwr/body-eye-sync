schema_version: 1

context:
  version: ${{ load_from_file("../../../pyproject.toml").project.version }}

package:
  name: body-eye-sync
  version: ${{ version }}

source:
  path: ../../..

build:
  noarch: python
  script:
    - python -m pip install . --no-deps --no-build-isolation -vv
    - if not exist "%PREFIX%\Menu" mkdir "%PREFIX%\Menu"
    - copy /Y "%RECIPE_DIR%\menu.json" "%PREFIX%\Menu\body-eye-sync.json"

requirements:
  host:
    - python 3.13.*
    - hatchling
    - pip
  run:
    - python >=3.11
    - boxmot ==21.0.0
    - ultralytics
    - click
    - numpy
    - opencv
    - pandas
    - qtpy
    - pyside6
    - menuinst >=2

about:
  homepage: https://github.com/ssciwr/body-eye-sync
  summary: Synchronize body and eye tracking data
  license: MIT
  license_file: LICENSE.md   # relative to the source root (the repo), not the recipe dir
