# Conda package for boxmot, which is only published on PyPI. It is built locally
# in CI and fed to constructor via a local channel, so the Windows installer can
# install boxmot (and all of its dependencies) entirely through conda - there is
# no pip step at install time on the user's machine.
#
# When bumping boxmot: update version + sha256 below, keep the pin in
# ../../../pyproject.toml in sync, and re-check the run: list against boxmot's
# core (non-extra) dependencies in its pyproject.toml.
schema_version: 1

context:
  version: "21.0.0"

package:
  name: boxmot
  version: ${{ version }}

source:
  url: https://files.pythonhosted.org/packages/19/9b/272d1a8365aab58e8d72b8978ead250fcfd59409a1c0aff265a952d9ddcb/boxmot-${{ version }}.tar.gz
  sha256: b044d73a33474ba49f9f1a49b55c7ed457d5a25e8f597cfadcbd63d2d4d06dd3

build:
  noarch: python
  script: python -m pip install . --no-deps --no-build-isolation -vv

requirements:
  host:
    - python 3.13.*
    - hatchling
    - pip
  run:
    # boxmot deps with pip names mapped to conda where they differ:
    #   lapx -> lap, opencv-python -> opencv, torch -> pytorch
    - python >=3.10
    - click >=8.1.8
    - filterpy >=1.4.5,<2
    - ftfy >=6.1.3,<7
    - gdown >=5.1.0,<6
    - huggingface_hub >=1.7.1
    - lap >=0.5.5,<1
    - numpy >=2.2.0
    - opencv >=4.7,<5
    - pandas >=2.0.0,<3
    - regex >=2024.0.0
    - rich >=15.0.0
    - scikit-learn >=1.3.0,<2
    - pytorch >=2.2.1,<3
    - torchvision >=0.17.1,<1
    - yacs >=0.1.8,<1

tests:
  - python:
      imports:
        - boxmot

about:
  homepage: https://github.com/mikel-brostrom/boxmot
  summary: BoxMOT - pluggable SOTA multi-object tracking modules
  license: AGPL-3.0-only
  license_file: LICENSE   # bundled from the boxmot sdist root (AGPL compliance)
