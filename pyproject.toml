[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "body-eye-sync"
version = "0.0.1"
dependencies = ["boxmot", "click"]
authors = [
    { name = "SSC" },
]
license = "MIT"
license-files = ["LICENSE.md"]
description = "Synchronize body and eye tracking data"
readme = "README.md"
requires-python = ">=3.10"
classifiers = [
    "Programming Language :: Python :: 3",
    "Operating System :: OS Independent",
]

[project.urls]
Github = "https://github.com/ssciwr/body-eye-sync"

[dependency-groups]
dev = [
    "pytest",
    "pytest-cov",
]

[project.scripts]
body-eye-sync = "body_eye_sync.__main__:main"
