name: CD

on:
  push:
    branches:
      - main
    tags:
      - "*.*.*"
  pull_request:
    branches:
      - main

jobs:
  pypi:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.0.0
      - run: uv build
      - if: github.event_name == 'push' && startsWith(github.event.ref, 'refs/tags/')
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true

  build-windows:
    name: Build Windows installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: "3.13"
      - run: uv build --wheel --out-dir installer
      - name: Export version from wheel
        shell: bash
        run: |
          whl=$(basename installer/body_eye_sync-*.whl)
          ver=${whl#body_eye_sync-}; ver=${ver%-py3-none-any.whl}
          echo "BODY_EYE_SYNC_VERSION=$ver" >> "$GITHUB_ENV"
      - uses: conda-incubator/setup-miniconda@v4
        with:
          miniforge-version: latest
      - name: Install constructor
        shell: bash -el {0}
        run: conda install -n base -y -c conda-forge constructor nsis
      - name: Build installer
        shell: bash -el {0}
        run: conda run -n base constructor installer/ --output-dir installer-dist
      - uses: actions/upload-artifact@v7
        with:
          name: body-eye-sync-windows-installer
          path: installer-dist/*.exe
          if-no-files-found: error
      - name: Install and test the built installer
        shell: pwsh
        run: |
          $exe = (Get-ChildItem installer-dist\*.exe)[0].FullName
          Start-Process -Wait -FilePath $exe -ArgumentList '/S','/D=C:\bes'
          C:\bes\python.exe -m pip install pytest pytest-qt
          $env:QT_QPA_PLATFORM = 'offscreen'
          C:\bes\python.exe -m pytest tests
