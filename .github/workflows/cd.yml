name: CD

on:
  push:
    branches:
      - main
    tags:
      - "*.*.*"
  pull_request:
    branches:
      - main

jobs:
  pypi:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
      - run: uv build
      - if: github.event_name == 'push' && startsWith(github.event.ref, 'refs/tags/')
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true

  build-windows:
    name: Build Windows installer
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.13"
      - name: Export version from pyproject
        shell: bash
        run: |
          ver=$(grep -m1 '^version' pyproject.toml | cut -d'"' -f2)
          echo "BODY_EYE_SYNC_VERSION=$ver" >> "$GITHUB_ENV"
      - name: Build app wheel
        run: uv build --wheel --out-dir installer
      # Fully pin + hash every runtime dependency for the Windows/py3.13 target.
      # torch (and torchvision) come from the CUDA 12.6 PyTorch index; everything
      # else from PyPI. The lockfile is shipped inside the installer and installed
      # with --require-hashes by post_install.bat.
      - name: Generate pinned hashed lockfile (CUDA torch)
        shell: bash
        run: |
          uv pip compile pyproject.toml \
            --python-version 3.13 \
            --default-index https://pypi.org/simple \
            --index pytorch=https://download.pytorch.org/whl/cu126 \
            --generate-hashes --emit-index-url \
            -o installer/requirements-win.lock
      - name: Render construct.yaml
        shell: bash
        run: uv run --no-project --with jinja2 python installer/render_construct.py
      - uses: conda-incubator/setup-miniconda@v4
        with:
          miniforge-version: latest
      - name: Install constructor
        shell: bash -el {0}
        run: conda install -n base -y -c conda-forge constructor nsis
      - name: Build installer
        shell: bash -el {0}
        run: conda run -n base constructor installer/ --output-dir installer-dist
      - uses: actions/upload-artifact@v7
        with:
          name: body-eye-sync-windows-installer
          path: installer-dist/*.exe
          if-no-files-found: error
      - name: Install and test the built installer
        shell: pwsh
        run: |
          $exe = (Get-ChildItem installer-dist\*.exe)[0].FullName
          Start-Process -Wait -FilePath $exe -ArgumentList '/S','/D=C:\bes'
          C:\bes\python.exe -m pip install pytest pytest-qt
          $env:QT_QPA_PLATFORM = 'offscreen'
          C:\bes\python.exe -m pytest tests
      - name: Publish installer to GitHub Release
        if: github.event_name == 'push' && startsWith(github.event.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: installer-dist/*.exe
          fail_on_unmatched_files: true
