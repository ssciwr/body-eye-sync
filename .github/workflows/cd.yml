name: CD

on:
  push:
    branches:
      - main
    tags:
      - "*.*.*"
  pull_request:
    branches:
      - main

jobs:
  pypi:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.0.0
      - run: uv build
      - if: github.event_name == 'push' && startsWith(github.event.ref, 'refs/tags/')
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true

  build-windows:
    name: Build Windows exe
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: "3.13"
      - run: uv sync --group build
      - run: >
          uv run pyinstaller
          --noconfirm
          --windowed
          --name body-eye-sync
          --collect-all boxmot
          src/body_eye_sync/__main__.py
      - uses: actions/upload-artifact@v7
        with:
          name: body-eye-sync-windows
          path: dist/body-eye-sync
          if-no-files-found: error
